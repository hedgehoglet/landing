<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404: Page Not Found · Hedgehoglet</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#080808">
  <link rel="icon" href="https://assets.hedgehoglet.dev/assets/logo.png">
  <link rel="preload" as="image" href="https://assets.hedgehoglet.dev/assets/logo.png" fetchpriority="high" crossorigin>
  <link rel="stylesheet" href="assets/404.css">
</head>

<body>
  <header class="error-nav">
    <a href="https://hedgehoglet.dev/" aria-label="Hedgehoglet home">
      <img src="https://assets.hedgehoglet.dev/assets/logo.png" alt="Hedgehoglet" width="32" height="32">
    </a>
  </header>

  <main>
    <img src="https://assets.hedgehoglet.dev/assets/logo.png" alt="Hedgehoglet" class="logo" width="100" height="100">

    <div class="error-code" aria-label="Error 404">404</div>

    <h1>Page not found</h1>
    <p>Looks like this hedgehog wandered off. The page you're looking for doesn't exist.</p>

    <p class="countdown">Redirecting in <span id="countdown">10</span>s</p>

    <a href="https://hedgehoglet.dev/" class="btn-home">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to home
    </a>
  </main>

  <script>
    let seconds = 10;
    const el = document.getElementById('countdown');
    const timer = setInterval(() => {
      el.textContent = --seconds;
      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = 'https://hedgehoglet.dev/';
      }
    }, 1000);
  </script>
</body>

</html>
